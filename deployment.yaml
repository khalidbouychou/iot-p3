
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khbouych-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khbouych-playground
  template:
    metadata:
      labels:
        app: khbouych-playground
    spec:
      containers:
      - name: playground
        image: khbouych42/playground:v1
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: khbouych-playground-service
  namespace: dev
spec:
  selector:
    app: khbouych-playground
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
  type: LoadBalancer 
