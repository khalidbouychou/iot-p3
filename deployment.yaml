apiVersion: apps/v1
kind: Deployment
metadata:
  name: khbouych-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khbouych-playground
  template:
    metadata:
      labels:
        app: khbouych-playground
    spec:
      containers:
      - name: playground-container
        image: khbouych1337/playground:v1 # <--- During defense, you khbouychl change this to v2
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: khbouych-playground-service
  namespace: dev
spec:
  selector:
    app: khbouych-playground
  ports:
    - protocol: TCP
      port: 8888        # Port exposed by the Service
      targetPort: 8888  # Port the app is listening on inside the container
  type: LoadBalancer    # This allows K3d to map it to your iMac's port 8888